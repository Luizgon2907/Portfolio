<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{
  background:#060f1a;
  background-image:linear-gradient(160deg,#060f1a 0%,#091829 35%,#0b1f38 65%,#0d2444 100%);
  background-attachment:fixed;margin:0;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:#e8f4f8;overflow-x:hidden;-webkit-font-smoothing:antialiased
}
#grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(0,200,232,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,232,0.018) 1px,transparent 1px);
  background-size:60px 60px}
::selection{background:rgba(0,200,232,0.22);color:#fff}
canvas#pcanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

@keyframes glitch{
  0%,100%{text-shadow:2px 0 #00c8e8,-2px 0 #0fb5a0;transform:translate(0)}
  20%{text-shadow:-3px 0 #00c8e8,3px 0 #0fb5a0;transform:translate(-1px,1px)}
  40%{text-shadow:3px 0 #00c8e8,-3px 0 #0fb5a0;transform:translate(1px,-1px)}
  60%{text-shadow:-2px 0 #0fb5a0,2px 0 #00c8e8;transform:translate(0)}
  80%{text-shadow:2px 0 #0fb5a0,-2px 0 #00c8e8;transform:translate(-1px,0)}
}
@keyframes neonPulse{
  0%,100%{box-shadow:0 0 12px #00c8e8,0 0 30px rgba(0,200,232,0.38),0 0 60px rgba(0,200,232,0.12),inset 0 0 12px rgba(0,200,232,0.06)}
  50%{box-shadow:0 0 22px #00c8e8,0 0 55px rgba(0,200,232,0.48),0 0 90px rgba(0,200,232,0.18),inset 0 0 22px rgba(0,200,232,0.10)}
}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes opptyPulse{
  0%,100%{box-shadow:0 0 8px rgba(0,200,232,0.22),0 0 16px rgba(0,200,232,0.07)}
  50%{box-shadow:0 0 18px rgba(0,200,232,0.44),0 0 36px rgba(0,200,232,0.14)}
}
@keyframes cursorFade{
  0%{opacity:0.8;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0)}
}
@keyframes timelineDrop{from{height:0}to{height:100%}}

.glitch-text{animation:glitch 4s infinite;animation-timing-function:steps(2,end)}
.glitch-text:hover{animation-duration:0.3s}
.neon-btn{animation:neonPulse 2.5s ease infinite;transition:transform 0.2s,letter-spacing 0.2s,background 0.25s}
.neon-btn:hover{transform:scale(1.07);letter-spacing:4px;background:rgba(0,200,232,0.08)!important}

.glass-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;
  background:rgba(4,9,20,0.82);backdrop-filter:blur(22px) saturate(200%);
  -webkit-backdrop-filter:blur(22px) saturate(200%);
  border-bottom:1px solid rgba(0,200,232,0.13);
  box-shadow:0 2px 50px rgba(0,0,0,0.6),0 1px 0 rgba(0,200,232,0.06)}

.card-3d{transition:transform 0.4s cubic-bezier(0.03,0.98,0.52,0.99);transform-style:preserve-3d;will-change:transform}
.card-flip-inner{transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d;position:relative;width:100%;height:100%}
.card-flip-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{backface-visibility:hidden;position:absolute;inset:0;border-radius:16px;overflow:hidden}
.card-back{transform:rotateY(180deg);padding:22px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.card-front{transition:box-shadow 0.35s,border-color 0.35s}
.vis-in{opacity:0;transform:translateY(28px);transition:opacity 0.6s,transform 0.6s cubic-bezier(0.16,1,0.3,1)}
.vis-in.visible{opacity:1;transform:none}
.skill-tag:hover{filter:brightness(1.25)}

.stat-card{transition:transform 0.2s,box-shadow 0.2s}
.stat-card:hover{transform:translateY(-3px)}
.career-card{transition:box-shadow 0.3s,border-color 0.3s}
.career-card:hover{border-color:inherit!important}

@media(max-width:900px){.pgrid{grid-template-columns:repeat(2,1fr)!important}.journey-grid{grid-template-columns:1fr!important}}
@media(max-width:640px){
  .pgrid{grid-template-columns:1fr!important}
  section{padding-left:16px!important;padding-right:16px!important}
  .glass-nav>div>div{gap:10px!important}
  .glass-nav a{font-size:7px!important}
  .journey-grid{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:repeat(3,1fr)!important}
}

<script>
/* ── Cursor trail ── */
(function(){
  var last=0;
  document.addEventListener('mousemove',function(e){
    var now=Date.now();if(now-last<20)return;last=now;
    var dot=document.createElement('div');
    var primary=Math.random()>0.5;var size=Math.random()*3.5+1.5;
    dot.style.cssText='position:fixed;pointer-events:none;border-radius:50%;z-index:9999;'
      +'left:'+e.clientX+'px;top:'+e.clientY+'px;width:'+size+'px;height:'+size+'px;'
      +'transform:translate(-50%,-50%);background:'+(primary?'#00c8e8':'#0fb5a0')+';'
      +'box-shadow:0 0 '+(size*3)+'px '+(primary?'rgba(0,200,232,0.85)':'rgba(15,181,160,0.85)')+';'
      +'animation:cursorFade 0.55s ease-out forwards;';
    document.body.appendChild(dot);
    setTimeout(function(){if(dot.parentNode)dot.parentNode.removeChild(dot)},600);
  });
})();

/* ── Particle canvas ── */
(function(){
var c=document.getElementById("pcanvas"),ctx=c.getContext("2d"),w,h,mx=0,my=0,LINK=130,COUNT=108;
function sz(){w=c.width=innerWidth;h=c.height=Math.max(document.body.scrollHeight,innerHeight*10)}
sz();
var P=[];for(var i=0;i<COUNT;i++)P.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.4+0.5,hue:Math.random()>0.5?192:173,base_o:Math.random()*0.4+0.15});
document.addEventListener("mousemove",function(e){mx=e.clientX;my=e.clientY+window.scrollY});
(function draw(){
  ctx.clearRect(0,0,w,h);var sy=window.scrollY;
  for(var i=0;i<P.length;i++){
    var p=P[i];var dx=mx-p.x,dy=my-p.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<220&&dist>1){p.vx+=dx/dist*0.018;p.vy+=dy/dist*0.018;}
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.99;p.vy*=0.99;
    if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
    if(p.y<sy-100||p.y>sy+innerHeight+100)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    var col=p.hue===192?"0,200,232":"15,181,160";
    ctx.fillStyle="rgba("+col+","+p.base_o+")";ctx.fill();
    for(var j=i+1;j<P.length;j++){
      var q=P[j];if(q.y<sy-100||q.y>sy+innerHeight+100)continue;
      var ddx=p.x-q.x,ddy=p.y-q.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dd<LINK){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle="rgba("+col+","+(0.09*(1-dd/LINK))+")";ctx.lineWidth=0.6;ctx.stroke();}
    }
  }
  requestAnimationFrame(draw);
})();
addEventListener("resize",sz);
setTimeout(sz,900);
setTimeout(sz,2500);
})();
</script>

function Orb(){
  const ref=useRef(null),raf=useRef(null);
  useEffect(()=>{
    const c=ref.current,ctx=c.getContext("2d");c.width=200;c.height=200;let t=0;
    const draw=()=>{
      ctx.clearRect(0,0,200,200);t+=0.008;const cx=100,cy=100,r=60;
      const g=ctx.createRadialGradient(cx-15,cy-20,5,cx,cy,r);
      g.addColorStop(0,"rgba(200,230,245,0.28)");g.addColorStop(0.3,"rgba(0,200,232,0.10)");
      g.addColorStop(0.7,"rgba(15,181,160,0.05)");g.addColorStop(1,"rgba(6,15,26,0.85)");
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,200,232,${0.16+Math.sin(t*3)*0.07})`;ctx.lineWidth=1.5;ctx.stroke();
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.ellipse(cx,cy,r+8+i*6,18+i*4,t*1.2+i*2.09,0,Math.PI*2);
        ctx.strokeStyle=i%2===0?`rgba(0,200,232,${0.09+Math.sin(t+i)*0.04})`:`rgba(15,181,160,${0.07+Math.sin(t+i)*0.03})`;
        ctx.lineWidth=0.9;ctx.stroke();}
      const sg=ctx.createRadialGradient(cx-20,cy-25,2,cx-20,cy-25,30);
      sg.addColorStop(0,"rgba(232,244,248,0.18)");sg.addColorStop(1,"rgba(232,244,248,0)");
      ctx.beginPath();ctx.arc(cx-20,cy-25,30,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
      raf.current=requestAnimationFrame(draw);};
    draw();return()=>cancelAnimationFrame(raf.current);
  },[]);
  return <canvas ref={ref} style={{width:160,height:160,animation:"orbFloat 5s ease-in-out infinite",flexShrink:0,filter:"drop-shadow(0 0 24px rgba(0,200,232,0.22))"}}/>
}

function Card({p,i:idx}){
  const [flipped,setFlipped]=useState(false),[vis,setVis]=useState(false),[hovered,setHovered]=useState(false);
  const ref=useRef(null),cardRef=useRef(null),c=p.neon;
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{threshold:0.05});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  const handleMouse=useCallback((e)=>{
    if(!cardRef.current||flipped)return;
    const r=cardRef.current.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;
    cardRef.current.style.transform=`perspective(900px) rotateY(${x*10}deg) rotateX(${-y*10}deg) scale(1.025)`;
  },[flipped]);
  const handleLeave=useCallback(()=>{if(cardRef.current)cardRef.current.style.transform="perspective(900px) rotateY(0) rotateX(0) scale(1)";setHovered(false);},[]);
  const glow=hovered
    ?`0 24px 80px rgba(0,0,0,0.9),0 0 50px ${c}70,0 0 100px ${c}25,inset 0 1px 0 rgba(232,244,248,0.12)`
    :`0 8px 50px rgba(0,0,0,0.7),0 0 25px ${c}28,0 0 60px ${c}0e,inset 0 1px 0 rgba(232,244,248,0.06)`;
  return <div ref={ref} style={{opacity:vis?1:0,transform:vis?"none":"translateY(32px)",transition:`opacity 0.55s ${idx*0.08}s,transform 0.55s ${idx*0.08}s`,perspective:900}}>
    <div ref={cardRef} className="card-3d" onMouseMove={handleMouse} onMouseLeave={handleLeave} onMouseEnter={()=>setHovered(true)} style={{height:450,borderRadius:16,cursor:"pointer",position:"relative"}} onClick={()=>setFlipped(!flipped)}>
      <div className={`card-flip-inner${flipped?" flipped":""}`}>
        <div className="card-front" style={{background:"rgba(4,9,22,0.92)",backdropFilter:"blur(24px) saturate(180%)",WebkitBackdropFilter:"blur(24px) saturate(180%)",border:`1.5px solid ${c}`,boxShadow:glow}}>
          <div style={{borderBottom:`1px solid ${c}28`,overflow:"hidden",borderRadius:"16px 16px 0 0"}} dangerouslySetInnerHTML={{__html:MOCKUPS[p.mock]}}/>
          <div style={{padding:"14px 18px 10px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <h3 style={{...G,fontSize:15,color:"#e8f4f8",margin:0,fontWeight:700}}>{p.title}</h3>
              <p style={{...I,fontSize:9,color:c,margin:"3px 0 0",letterSpacing:"2px",textTransform:"uppercase",fontWeight:700,textShadow:`0 0 8px ${c}70`}}>{p.cat}</p>
            </div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <span style={{...I,fontSize:8,padding:"4px 9px",borderRadius:4,background:`${c}12`,border:`1px solid ${c}60`,color:c,fontWeight:700,cursor:"default",whiteSpace:"nowrap"}}>↗ Demo</span>
              <span style={{...I,fontSize:8,padding:"4px 9px",borderRadius:4,background:"rgba(232,244,248,0.05)",border:"1px solid rgba(200,225,240,0.22)",color:"rgba(200,225,240,0.72)",fontWeight:700,cursor:"default",whiteSpace:"nowrap"}}>⌥ Code</span>
            </div>
          </div>
          <div style={{padding:"0 18px 8px"}}>
            <p style={{...I,fontSize:12,color:"rgba(200,225,240,0.68)",lineHeight:1.6,margin:0}}>{p.desc}</p>
          </div>
          <div style={{position:"absolute",bottom:12,left:14,right:14,display:"flex",flexWrap:"wrap",gap:4}}>
            {p.stack.slice(0,5).map((t,j)=>(
              <span key={j} style={{...I,fontSize:9,padding:"3px 8px",borderRadius:4,fontWeight:700,background:`${c}15`,color:c,border:`1px solid ${c}60`,textShadow:`0 0 6px ${c}70`}}>{t}</span>
            ))}
            {p.stack.length>5&&<span style={{...I,fontSize:9,padding:"3px 8px",borderRadius:4,fontWeight:600,color:"rgba(200,225,240,0.42)",border:"1px solid rgba(200,225,240,0.16)"}}>+{p.stack.length-5}</span>}
          </div>
        </div>
        <div className="card-back" style={{background:"rgba(3,7,17,0.97)",backdropFilter:"blur(24px)",border:`1.5px solid ${c}85`,boxShadow:`0 0 50px ${c}25,inset 0 0 30px ${c}05`}}>
          <h3 style={{...G,fontSize:17,color:c,marginBottom:14,fontWeight:700,textShadow:`0 0 24px ${c}60`}}>{p.title}</h3>
          <div style={{flex:1}}>
            {p.feats.map((f,j)=>(
              <div key={j} style={{display:"flex",gap:8,marginBottom:8}}>
                <span style={{color:c,fontSize:13,lineHeight:1,flexShrink:0,filter:`drop-shadow(0 0 5px ${c})`}}>▸</span>
                <span style={{...I,fontSize:12,color:"rgba(200,225,240,0.82)",lineHeight:1.5,fontWeight:500}}>{f}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,padding:"10px 13px",borderRadius:8,background:"rgba(232,244,248,0.02)",border:"1px solid rgba(200,225,240,0.08)"}}>
            <p style={{...O,fontSize:7.5,letterSpacing:"2px",color:"rgba(200,225,240,0.28)",marginBottom:5}}>ARCHITECTURE</p>
            <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"rgba(200,225,240,0.58)",margin:0,lineHeight:1.4}}>{p.arch}</p>
          </div>
          <div style={{marginTop:8,padding:"10px 13px",borderRadius:8,background:`${c}09`,border:`1px solid ${c}28`}}>
            <p style={{...O,fontSize:7.5,letterSpacing:"2px",color:c,marginBottom:4,opacity:0.72}}>IMPACT</p>
            <p style={{...I,fontSize:12.5,color:"rgba(200,225,240,0.88)",margin:0,fontWeight:600}}>{p.impact}</p>
          </div>
          <p style={{...I,fontSize:9,color:"rgba(200,225,240,0.22)",marginTop:10,textAlign:"center"}}>Click to flip back ↩</p>
        </div>
      </div>
    </div>
  </div>
}

function App(){
  const [active,setActive]=useState("about");
  useEffect(()=>{
    const ids=["about","journey","career","projects","skills","contact"];
    const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)setActive(e.target.id)}),{rootMargin:"-40% 0px -40% 0px"});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el)});return()=>obs.disconnect();
  },[]);
  return <div style={{position:"relative",zIndex:2}}>
    <Nav active={active}/>
    <Hero/>
    <Journey/>
    <CareerTimeline/>
    <section id="projects" style={{padding:"60px 32px 100px",maxWidth:1280,margin:"0 auto",position:"relative",zIndex:2}}>
      <SL text="Portfolio"/>
      <h2 style={{...G,fontSize:"clamp(26px,3.5vw,44px)",color:"#e8f4f8",fontWeight:700,marginTop:8,marginBottom:12,letterSpacing:"-0.5px"}}>Software I've Built</h2>
      <p style={{...I,fontSize:15,color:"rgba(200,225,240,0.44)",maxWidth:560,lineHeight:1.7,marginBottom:40}}>Every project solves a real problem I encountered in finance — built with production-grade code.</p>
      <div className="pgrid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18}}>
        {PROJECTS.map((p,i)=><Card key={p.id} p={p} i={i}/>)}
      </div>
    </section>
    <Skills/>
    <Contact/>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
